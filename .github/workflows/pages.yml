name: Deploy download page

# Publishes download/index.html to GitHub Pages — the simple, one-button
# download site a non-technical user visits (no GitHub file lists). The button
# resolves the latest signed installer via the GitHub API at page load.

on:
  push:
    branches: [main]
    paths:
      - 'download/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: download
      - id: deployment
        uses: actions/deploy-pages@v4
