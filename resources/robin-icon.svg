<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Robin by EnergyIR — app icon. A brand-green robin in flight on the
       EnergyIR dark tile. Deliberately distinct from any superhero trade dress. -->
  <defs>
    <radialGradient id="tile" cx="38%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#143a2b"/>
      <stop offset="55%" stop-color="#102d22"/>
      <stop offset="100%" stop-color="#0f1115"/>
    </radialGradient>
    <linearGradient id="bird" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#55c392"/>
      <stop offset="100%" stop-color="#3aa676"/>
    </linearGradient>
  </defs>

  <!-- App tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#tile)"/>

  <!-- Subtle inner ring -->
  <rect x="48" y="48" width="928" height="928" rx="188" fill="none"
        stroke="#3aa676" stroke-opacity="0.16" stroke-width="6"/>

  <!-- Robin: a single, confident bird-in-flight glyph -->
  <g transform="translate(512 524)">
    <!-- upper wing sweep -->
    <path d="M -250 -40
             C -150 -180, 40 -210, 150 -120
             C 70 -150, -40 -120, -110 -30
             C -60 -70, 30 -78, 96 -40
             C 18 -60, -70 -36, -118 38
             Z"
          fill="url(#bird)"/>
    <!-- lower wing / tail sweep -->
    <path d="M -250 -40
             C -170 70, -40 168, 120 150
             C 210 138, 268 70, 286 -18
             C 250 60, 170 104, 86 96
             C 6 88, -56 40, -86 -24
             C -140 6, -210 0, -250 -40
             Z"
          fill="url(#bird)" fill-opacity="0.92"/>
    <!-- head + breast accent -->
    <circle cx="196" cy="-104" r="58" fill="url(#bird)"/>
    <circle cx="214" cy="-118" r="16" fill="#0f1115"/>
    <!-- beak -->
    <path d="M 250 -104 L 320 -86 L 252 -72 Z" fill="#d8a657"/>
    <!-- sidekick spark -->
    <circle cx="-208" cy="-150" r="20" fill="#55c392"/>
    <circle cx="-150" cy="-198" r="11" fill="#55c392" fill-opacity="0.75"/>
  </g>
</svg>
